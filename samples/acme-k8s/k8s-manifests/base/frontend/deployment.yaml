apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: acme
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/acme-org/frontend:main  # CI bot updates this tag
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_BASE
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: API_BASE_URL
