version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    image: ghcr.io/acme-org/app-frontend:${FRONTEND_TAG:-main}
    expose:
      - "3000"
    environment:
      - VITE_API_BASE=/api
      - NODE_ENV=staging
    restart: unless-stopped

  backend:
    image: ghcr.io/acme-org/app-backend:${BACKEND_TAG:-main}
    expose:
      - "8000"
    env_file:
      - .env.staging
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - pg_staging_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: acme_staging
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: acme_staging
    restart: unless-stopped

volumes:
  pg_staging_data:
