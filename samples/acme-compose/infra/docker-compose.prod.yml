version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    image: ghcr.io/acme-org/app-frontend:${FRONTEND_TAG:-main}
    expose:
      - "3000"
    environment:
      - VITE_API_BASE=/api
    restart: unless-stopped

  backend:
    image: ghcr.io/acme-org/app-backend:${BACKEND_TAG:-main}
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-acme}
    restart: unless-stopped

volumes:
  pg_data:
